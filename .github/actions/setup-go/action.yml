name: "Setup Go"
description: "Set up and verify the requested Go toolchain"
inputs:
  go-version:
    description: "The exact Go version to install"
    required: false
    # Keep this pin synchronized with the primary CI and release smoke-test
    # matrices. Upgrade it in a dedicated toolchain-update PR.
    default: "1.26.5"
runs:
  using: "composite"
  steps:
    - name: Set up Go
      uses: actions/setup-go@v7
      with:
        go-version: ${{ inputs.go-version }}
        cache: false

    - name: Verify Go installation
      shell: bash
      run: |
        set -euo pipefail

        requested="${{ inputs.go-version }}"
        requested="${requested#go}"
        actual="$(go env GOVERSION)"
        actual="${actual#go}"

        if [[ ! "$requested" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
          echo "Go version must be an exact stable release, got ${requested}" >&2
          exit 1
        fi
        if [[ "$actual" != "$requested" ]]; then
          echo "Expected Go ${requested}, got go${actual}" >&2
          exit 1
        fi

        echo "Requested Go: ${requested}"
        echo "Resolved Go: go${actual}"
        echo "Go binary: $(command -v go)"
        go version
        go env GOROOT
