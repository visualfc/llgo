name: GOROOT

on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  goroot:
    name: GOROOT (${{ matrix.lane }}, ${{ matrix.os }}, Go ${{ matrix.go-version }}, shard ${{ matrix.shard-index }}/4)
    continue-on-error: ${{ matrix.lane == 'compatibility' }}
    timeout-minutes: 180
    env:
      GOPROXY: https://proxy.golang.org,direct
      LLGO_GOROOT_HEARTBEAT_SECONDS: "60"
      LLGO_GOROOT_VERBOSE: "1"
    strategy:
      fail-fast: false
      matrix:
        # These are reproducibility pins, not floating series selectors.
        # Upgrade them together in a dedicated toolchain-update PR.
        os: [macos-latest, ubuntu-latest]
        go-version: ["1.24.11", "1.26.5"]
        shard-index: ["0", "1", "2", "3"]
        include:
          - go-version: "1.24.11"
            lane: compatibility
          - go-version: "1.26.5"
            lane: primary
        # Keep both supported runtime generations on Linux and macOS. Go 1.25
        # is intentionally omitted because it is not a compatibility target.
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7

      - name: Install dependencies
        uses: ./.github/actions/setup-deps
        with:
          llvm-version: 19

      - name: Set up Go
        uses: ./.github/actions/setup-go
        with:
          go-version: ${{ matrix.go-version }}

      - name: Show toolchain versions
        run: |
          go version
          go env GOPROXY GOMODCACHE
          clang --version

      - name: Download Go modules
        timeout-minutes: 10
        run: go mod download

      - name: Run GOROOT runner
        run: |
          bash dev/test_goroot.sh -- \
            -directive-mode ci \
            -progress 60s \
            -shard-index "${{ matrix.shard-index }}" \
            -shard-total "4"
